<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<title>Series 63 Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #F5F3EE;
  --paper2: #EDE9E2;
  --paper3: #E2DDD5;
  --card: #FFFFFF;
  --border: #D6D0C8;
  --ink: #1A1C2A;
  --ink2: #3A3D52;
  --ink3: #6B6F85;
  --ghost: #9EA2B5;
  --sb: #2A2D3A;
  --sb2: #353848;
  --sb3: #424659;
  --sb-border: #404358;
  --sb-txt: #C8CCDF;
  --sb-dim: #8B8FA8;
  --sb-active-bg: #3B4060;
  --blue: #2563EB;
  --blue-lt: #EEF3FD;
  --blue-md: #BAC9F8;
  --green: #16A34A;
  --green-lt: #EDFBF2;
  --red: #DC2626;
  --red-lt: #FEF2F2;
  --amber: #D97706;
  --amber-lt: #FFFBEB;
  --r: 13px;
  --r-sm: 8px;
  --fs: 16.5px;
  --lh: 1.82;
  --ls: 0.01em;
  --sb-w: 272px;
  --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-serif: 'Lora', Georgia, serif;
}

body.dys, body.dys * { font-family: 'OpenDyslexic', var(--font-sans) !important; }
body.wsp { --ls: 0.05em; --lh: 2.08; word-spacing: 0.12em; }
body.fsl { --fs: 19.5px; }
body.fsx { --fs: 22.5px; }
body.hic { --paper: #fff; --paper2: #f0f0f0; --paper3: #e0e0e0; --card: #fff; --border: #bbb; --ink: #000; --ink2: #111; --ink3: #333; }

@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/ttf/OpenDyslexic-Regular.ttf') format('truetype');
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: var(--fs);
  line-height: var(--lh);
  letter-spacing: var(--ls);
  min-height: 100vh;
  overflow-x: hidden;
}

.hidden { display: none !important; }
.fa { animation: fadeUp 0.2s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.app { display: flex; min-height: 100vh; }

.sidebar {
  width: var(--sb-w);
  flex-shrink: 0;
  background: var(--sb);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 300;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: transform 0.27s cubic-bezier(0.4, 0, 0.2, 1);
  scrollbar-width: thin;
  scrollbar-color: var(--sb3) transparent;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--sb3); border-radius: 2px; }

.sb-brand {
  padding: 20px;
  border-bottom: 1px solid var(--sb-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--sb);
  z-index: 2;
  flex-shrink: 0;
}

.sb-logo { display: flex; align-items: baseline; gap: 7px; }
.sb-num { font-family: var(--font-serif); font-size: 26px; font-weight: 700; color: #fff; line-height: 1; }
.sb-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; color: var(--sb-dim); text-transform: uppercase; }
.sb-close {
  display: none;
  background: var(--sb2);
  border: 1px solid var(--sb-border);
  color: var(--sb-dim);
  width: 30px;
  height: 30px;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

.sb-prog { padding: 12px 20px; border-bottom: 1px solid var(--sb-border); }
.sb-prog-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--sb-dim); margin-bottom: 5px; font-weight: 600; }
.prog-track { background: var(--sb3); border-radius: 99px; height: 4px; overflow: hidden; }
.prog-fill { height: 4px; border-radius: 99px; background: linear-gradient(90deg, var(--blue), #22D3EE); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

.sb-nav { flex: 1; padding: 8px 0 20px; }
.sb-section { margin-bottom: 2px; }
.sb-sec-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: none;
  border: none;
  color: var(--sb-txt);
  cursor: pointer;
  text-align: left;
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 700;
  transition: background 0.12s, color 0.12s;
  letter-spacing: 0.01em;
}

.sb-sec-btn:hover { background: var(--sb2); color: #fff; }
.sb-sec-btn.active-sec { color: #fff; }
.sb-sec-ico { font-size: 14px; flex-shrink: 0; }
.sb-sec-lbl { flex: 1; }
.sb-sec-arrow { font-size: 11px; color: var(--sb-dim); transition: transform 0.2s; flex-shrink: 0; }
.sb-sec-arrow.open { transform: rotate(180deg); }
.sb-sec-score { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
.sc-g { background: rgba(22, 163, 74, 0.2); color: #4ADE80; }
.sc-y { background: rgba(217, 119, 6, 0.2); color: #FCD34D; }
.sc-r { background: rgba(220, 38, 38, 0.2); color: #FCA5A5; }

.sb-subs { overflow: hidden; transition: max-height 0.25s ease; }
.sb-sub-item {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 8px 20px 8px 44px;
  cursor: pointer;
  font-size: 12px;
  color: var(--sb-dim);
  transition: background 0.1s, color 0.1s;
  border-left: 3px solid transparent;
  margin-left: 0;
}

.sb-sub-item:hover { background: var(--sb2); color: var(--sb-txt); }
.sb-sub-item.on { background: var(--sb-active-bg); color: #fff; border-left-color: var(--blue); }

.ni {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  border-left: 3px solid transparent;
  color: #D4D7E8;
  font-weight: 600;
  font-size: 13px;
  transition: background 0.12s, color 0.12s;
}

.ni:hover { background: var(--sb2); color: #fff; }
.ni.on { background: var(--sb-active-bg); color: #fff; border-left-color: var(--blue); }
.ni-ico { font-size: 14px; flex-shrink: 0; }
.ni-lbl { flex: 1; }
.sb-sub-num { font-weight: 700; margin-right: 6px; font-size: 11px; flex-shrink: 0; color: inherit; }
.sb-sub-lbl { flex: 1; line-height: 1.3; }
.sb-sub-check { font-size: 11px; flex-shrink: 0; margin-left: 4px; }

.sb-foot { padding: 14px 20px; border-top: 1px solid var(--sb-border); flex-shrink: 0; }
.sb-foot-label { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sb-dim); margin-bottom: 8px; }
.tog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 5px; }
.tog {
  padding: 7px 4px;
  background: var(--sb2);
  border: 1px solid var(--sb-border);
  border-radius: var(--r-sm);
  color: var(--sb-dim);
  cursor: pointer;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--font-sans);
  text-align: center;
  transition: all 0.12s;
}

.tog:hover { border-color: var(--blue); color: var(--blue); }
.tog.on { background: rgba(37, 99, 235, 0.2); border-color: var(--blue); color: #93B4FD; }
.voice-wrap { margin-top: 8px; }
.voice-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sb-dim); margin-bottom: 4px; }
.voice-sel {
  width: 100%;
  background: var(--sb2);
  border: 1px solid var(--sb-border);
  color: var(--sb-txt);
  border-radius: var(--r-sm);
  padding: 7px 9px;
  font-size: 11px;
  font-family: var(--font-sans);
  cursor: pointer;
  outline: none;
}

.voice-sel:focus { border-color: var(--blue); }

.main-panel {
  margin-left: var(--sb-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 200;
  height: 56px;
  background: rgba(245, 243, 238, 0.94);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 18px;
  flex-shrink: 0;
}

.tb-ham { display: none; background: none; border: none; color: var(--ink3); font-size: 20px; cursor: pointer; padding: 6px; border-radius: 6px; }
.tb-title { font-size: 14px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink); }
.tb-tabs { display: flex; gap: 4px; flex-shrink: 0; }
.tbt {
  padding: 6px 12px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--ink3);
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-sans);
  white-space: nowrap;
  transition: all 0.12s;
}

.tbt:hover { border-color: var(--blue); color: var(--blue); }
.tbt.on { background: var(--blue); border-color: var(--blue); color: #fff; }

.content-area { flex: 1; padding: 28px 32px 60px; max-width: 760px; }

.btn {
  padding: 10px 18px;
  border-radius: var(--r-sm);
  border: none;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font-sans);
  cursor: pointer;
  min-height: 42px;
  transition: all 0.12s;
  letter-spacing: 0.02em;
}

.btn-p { background: var(--blue); color: #fff; }
.btn-p:hover { background: #1d4fd7; }
.btn-s { background: var(--card); border: 1.5px solid var(--border); color: var(--ink2); }
.btn-s:hover { border-color: var(--blue); color: var(--blue); }
.btn-sm { padding: 7px 14px; font-size: 12px; min-height: 36px; }

.ov { display: none; position: fixed; inset: 0; background: rgba(26, 28, 36, 0.45); backdrop-filter: blur(3px); z-index: 290; }
.ov.show { display: block; }

@media(max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.mobile-open { transform: translateX(0); }
  .main-panel { margin-left: 0; }
  .tb-ham { display: flex; align-items: center; justify-content: center; }
  .content-area { padding: 18px 16px 50px; }
}

@media(min-width: 769px) { .ov { display: none !important; } }
</style>
</head>
<body class="wsp">

<div class="ov" id="ov" onclick="closeSidebar()"></div>

<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="sb-brand">
    <div class="sb-logo">
      <span class="sb-num">63</span>
      <span class="sb-tag">Exam Prep</span>
    </div>
    <button class="sb-close" id="sb-close" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sb-prog">
    <div class="sb-prog-row"><span>Progress</span><span id="sb-opct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="sb-obar" style="width:0%"></div></div>
  </div>
  <nav class="sb-nav" id="sb-nav"></nav>
  <div class="sb-foot">
    <div class="sb-foot-label">Reading Options</div>
    <div class="tog-grid">
      <button class="tog" id="t-dys" onclick="toggleDys()">OpenDyslexic</button>
      <button class="tog on" id="t-wsp" onclick="toggleWsp()">Wide Spacing</button>
    </div>
    <div class="tog-grid">
      <button class="tog" id="t-fs" onclick="cycleFontSize()">Text: Normal</button>
      <button class="tog" id="t-hic" onclick="toggleHic()">High Contrast</button>
    </div>
    <div class="voice-wrap">
      <div class="voice-lbl">🔊 Voice</div>
      <select class="voice-sel" id="voice-sel" onchange="setVoice(this.value)">
        <option>Loading voices…</option>
      </select>
      <div id="voice-note" style="font-size:10px;margin-top:5px;font-weight:700;letter-spacing:.02em;min-height:14px;"></div>
      <div style="font-size:10px;color:var(--sb-dim);margin-top:3px;line-height:1.45;">Best quality: use <strong style="color:#93B4FD">Chrome</strong> on desktop or <strong style="color:#93B4FD">Safari</strong> on Mac.</div>
    </div>
  </div>
</aside>

<div class="main-panel">
  <div class="topbar">
    <button class="tb-ham" onclick="openSidebar()">☰</button>
    <div class="tb-title" id="tb-title">Series 63 Prep</div>
  </div>

  <div class="content-area" id="content-area">
    <div id="v-home" class="fa">
      <h1>Series 63 Study Hub</h1>
      <p>Welcome! Select a section from the sidebar to begin.</p>
    </div>
  </div>
</div>
</div>

<script>
// ===== STATE MANAGEMENT =====
const STATE = {
  currentView: 'home',
  currentSection: null,
  currentSub: null,
  fontSize: 'normal',
  dyslexic: false,
  wideSpacing: true,
  highContrast: false,
  currentAudioSpeed: 1,
  progress: {}
};

// ===== SIDEBAR FUNCTIONS =====
function openSidebar() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('ov').classList.add('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('ov').classList.remove('show');
}

// ===== ACCESSIBILITY FUNCTIONS =====
function toggleDys() {
  STATE.dyslexic = !STATE.dyslexic;
  document.body.classList.toggle('dys');
  document.getElementById('t-dys').classList.toggle('on');
  localStorage.setItem('dyslexic', STATE.dyslexic);
}

function toggleWsp() {
  STATE.wideSpacing = !STATE.wideSpacing;
  document.body.classList.toggle('wsp');
  document.getElementById('t-wsp').classList.toggle('on');
  localStorage.setItem('wideSpacing', STATE.wideSpacing);
}

function cycleFontSize() {
  const sizes = ['normal', 'large', 'xlarge'];
  const idx = sizes.indexOf(STATE.fontSize);
  STATE.fontSize = sizes[(idx + 1) % sizes.length];
  
  document.body.classList.remove('fsl', 'fsx');
  if (STATE.fontSize === 'large') document.body.classList.add('fsl');
  if (STATE.fontSize === 'xlarge') document.body.classList.add('fsx');
  
  const labels = { normal: 'Normal', large: 'Large', xlarge: 'XLarge' };
  document.getElementById('t-fs').textContent = `Text: ${labels[STATE.fontSize]}`;
  localStorage.setItem('fontSize', STATE.fontSize);
}

function toggleHic() {
  STATE.highContrast = !STATE.highContrast;
  document.body.classList.toggle('hic');
  document.getElementById('t-hic').classList.toggle('on');
  localStorage.setItem('highContrast', STATE.highContrast);
}

// ===== VOICE FUNCTIONS =====
function setVoice(idx) {
  localStorage.setItem('voiceIdx', idx);
  const note = document.getElementById('voice-note');
  note.textContent = idx > 0 ? '✓ Voice selected' : '';
}

function initVoices() {
  const voices = window.speechSynthesis.getVoices();
  const select = document.getElementById('voice-sel');
  select.innerHTML = '';
  voices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})`;
    select.appendChild(opt);
  });
}

window.speechSynthesis.onvoiceschanged = initVoices;

// ===== NAVIGATION =====
function goHome() {
  STATE.currentView = 'home';
  STATE.currentSection = null;
  renderHome();
}

function switchTab(tab) {
  console.log('Switch to:', tab);
}

function backToList() {
  renderSection(STATE.currentSection);
}

function nextSub() {
  console.log('Next subsection');
}

// ===== COUNTDOWN =====
function cdToggleEdit() {
  document.getElementById('cd-input-wrap').classList.toggle('show');
}

function cdSaveDate() {
  const dateInput = document.getElementById('cd-date-input').value;
  if (dateInput) {
    localStorage.setItem('examDate', dateInput);
    updateCountdown();
    cdToggleEdit();
  }
}

function cdClearDate() {
  localStorage.removeItem('examDate');
  document.getElementById('cd-days').textContent = '--';
  document.getElementById('cd-subtext').textContent = 'Tap "Set Date" to start your countdown';
  cdToggleEdit();
}

function updateCountdown() {
  const examDate = localStorage.getItem('examDate');
  if (!examDate) return;
  
  const today = new Date();
  const exam = new Date(examDate);
  const diff = Math.ceil((exam - today) / (1000 * 60 * 60 * 24));
  
  document.getElementById('cd-days').textContent = Math.max(0, diff);
  if (diff < 0) {
    document.getElementById('cd-subtext').textContent = 'Exam date has passed!';
  }
}

// ===== AUDIO PLAYER =====
function apToggle() {
  console.log('Audio toggle');
}

function apSkip(secs) {
  console.log('Skip', secs, 'seconds');
}

function cycleSpeed() {
  const speeds = [0.75, 1, 1.25, 1.5];
  const idx = speeds.indexOf(STATE.currentAudioSpeed);
  STATE.currentAudioSpeed = speeds[(idx + 1) % speeds.length];
  document.getElementById('ap-spd').textContent = STATE.currentAudioSpeed + '×';
}

function scrubStart(event) {
  console.log('Scrub start');
}

function scrubTouchStart(event) {
  console.log('Touch scrub start');
}

// ===== FLASHCARDS =====
function flipCard() {
  const card = document.getElementById('fc');
  if (card) card.classList.toggle('flip');
}

function nextCard() {
  console.log('Next card');
}

function prevCard() {
  console.log('Prev card');
}

function rateCard() {
  console.log('Rate card');
}

function shuffleCards() {
  console.log('Shuffle cards');
}

// ===== RENDERING =====
function renderHome() {
  const area = document.getElementById('content-area');
  area.innerHTML = `
    <div id="v-home" class="fa">
      <h1>Series 63 Study Hub</h1>
      <p>Welcome to your Series 63 exam preparation guide. Select a section from the sidebar to begin studying.</p>
    </div>
  `;
}

function renderSection(sectionId) {
  console.log('Render section:', sectionId);
}

// ===== INITIALIZATION =====
function loadState() {
  const saved = {
    dyslexic: localStorage.getItem('dyslexic') === 'true',
    wideSpacing: localStorage.getItem('wideSpacing') !== 'false',
    fontSize: localStorage.getItem('fontSize') || 'normal',
    highContrast: localStorage.getItem('highContrast') === 'true'
  };
  
  Object.assign(STATE, saved);
  
  if (STATE.dyslexic) { document.body.classList.add('dys'); document.getElementById('t-dys').classList.add('on'); }
  if (!STATE.wideSpacing) { document.body.classList.remove('wsp'); document.getElementById('t-wsp').classList.remove('on'); }
  if (STATE.fontSize === 'large') document.body.classList.add('fsl');
  if (STATE.fontSize === 'xlarge') document.body.classList.add('fsx');
  if (STATE.highContrast) { document.body.classList.add('hic'); document.getElementById('t-hic').classList.add('on'); }
  
  updateCountdown();
}

window.addEventListener('load', function() {
  loadState();
  initVoices();
  renderHome();
});
</script>

</body>
</html>
