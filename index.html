<script>
// AUDIO_SYNC system to sync words with audio playback
const audio = document.querySelector('audio');
const spans = document.querySelectorAll('.w');

function highlightWords() {
    let currentTime = audio.currentTime;
    spans.forEach(span => {
        const start = parseFloat(span.dataset.start);
        const end = parseFloat(span.dataset.end);

        if (currentTime >= start && currentTime <= end) {
            span.classList.add('lit');
            span.classList.remove('past');
        } else if (currentTime > end) {
            span.classList.add('past');
            span.classList.remove('lit');
        } else {
            span.classList.remove('lit', 'past');
        }
    });
}

audio.addEventListener('timeupdate', highlightWords);
</script>
