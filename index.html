<audio id="audio-player" controls>
  <source src="audio-file.mp3" type="audio/mpeg">
  Your browser does not support the audio tag.
</audio>

<script>
const AUDIO_SYNC = {
    highlights: [
        { start: 0, end: 3, textId: 'text1' },
        { start: 4, end: 7, textId: 'text2' }
        // Add more timing data as needed
    ],
    currentHighlightIndex: 0,

    init: function(audioElement) {
        audioElement.addEventListener('timeupdate', () => {
            this.updateHighlights(audioElement.currentTime);
        });
    },

    updateHighlights: function(currentTime) {
        this.highlights.forEach((highlight, index) => {
            if (currentTime >= highlight.start && currentTime <= highlight.end) {
                document.getElementById(highlight.textId).classList.add('highlight');
                this.currentHighlightIndex = index;
            } else {
                document.getElementById(highlight.textId).classList.remove('highlight');
            }
        });
    }
};

// Initialize audio sync
const audioPlayer = document.getElementById('audio-player');
AUDIO_SYNC.init(audioPlayer);

</script>

<style>
.highlight {
    transition: background-color 0.02s;
    background-color: yellow;
}
</style>
